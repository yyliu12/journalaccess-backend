    <!-- Asciidoctor.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/asciidoctor.js/1.5.9/asciidoctor.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');
        @import url("https://fonts.googleapis.com/css?family=Noto+Sans");
        @import url("https://cdn.jsdelivr.net/gh/asciidoctor/asciidoctor@2.0/data/stylesheets/asciidoctor-default.css");


        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        html {
            padding: 0;
            margin: 0;
        }

        :root {
            --bg: #f5f3f0;
            --surface: #ffffff;
            --border: #ddd9d0;
            --accent: #a07828;
            --accent2: #4f3faa;
            --text: #1c1826;
            --muted: #8c8499;
            --gutter: 42px;
            --header-h: 46px;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Fraunces', Georgia, serif;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Fraunces', serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .04em;
            color: var(--text);
        }

        .logo-badge {
            background: var(--accent);
            color: #0f0e11;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 7px;
            border-radius: 3px;
            letter-spacing: .08em;
        }

        .toolbar {
            display: flex;
            gap: 6px;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            letter-spacing: .06em;
            transition: color .15s, border-color .15s, background .15s;
        }

        .btn:hover {
            color: var(--text);
            border-color: var(--accent);
            background: rgba(212, 168, 83, .06);
        }

        .btn.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(212, 168, 83, .08);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3cb57a;
            box-shadow: 0 0 6px #3cb57a88;
            transition: background .3s, box-shadow .3s;
        }

        .status-dot.stale {
            background: var(--accent);
            box-shadow: 0 0 6px #d4a85388;
        }

        /* ── MAIN LAYOUT ── */
        .workspace {
            display: flex;
            height: calc(100vh - var(--header-h));
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .pane-header {
            height: 34px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: .08em;
            gap: 8px;
            flex-shrink: 0;
        }

        .pane-header-icon {
            width: 16px;
            height: 16px;
            opacity: .5;
        }

        .pane-label {
            text-transform: uppercase;
        }

        /* ── DIVIDER ── */
        .divider {
            width: 5px;
            background: var(--border);
            cursor: col-resize;
            flex-shrink: 0;
            position: relative;
            transition: background .15s;
        }

        .divider:hover,
        .divider.dragging {
            background: var(--accent2);
        }

        .divider::before {
            content: '';
            position: absolute;
            inset: 0 -4px;
        }

        /* ── EDITOR PANE ── */
        .editor-wrap {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .CodeMirror {
            height: 100%;
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 13.5px;
            line-height: 1.75;
            border: none;
        }

        .CodeMirror-scroll {
            padding-bottom: 60px;
        }

        .CodeMirror-gutters {
            border-right: 1px solid var(--border) !important;
            width: var(--gutter);
        }

        .CodeMirror-linenumber {
            font-size: 11px;
            padding-right: 10px;
        }

        .CodeMirror-cursor {
            border-left: 2px solid var(--accent) !important;
        }

        .CodeMirror-selected {}



        .CodeMirror-scrollbar-filler,
        .CodeMirror-gutter-filler {}

        /* ── PREVIEW PANE ── */
        .preview-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #ccc #faf8f4;
            background: white;

        }

        .preview-inner {
            max-width: 720px;
            padding: 48px 48px 80px;
        }


        :root {
            --maincolor: #FFFFFF;
            --primarycolor: #2c3e50;
            --secondarycolor: #ba3925;
            --tertiarycolor: #186d7a;
            --sidebarbackground: #CCC;
            --linkcolor: #b71c1c;
            --linkcoloralternate: #f44336;
            --white: #FFFFFF;
            --black: #000000;
        }


        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #9991a8;
            display: none;
        }

        .empty-state.visible {
            display: block;
        }

        .empty-state h3 {
            font-family: 'Fraunces', serif;
            font-size: 1.4em;
            margin-bottom: .5em;
            color: #bbb4cc;
        }

        .empty-state p {
            font-size: .9em;

    </style>
</head>

<body>

    <header>
        <div class="logo">
            <span class="logo-badge">adoc</span>
            AsciiDoc Editor
        </div>
        <div class="toolbar">
            <div class="status-dot" id="statusDot" title="Up to date"></div>
            <button class="btn" id="btnSave" title="SAVE">SAVE</button>
            <button class="btn" id="btnCopy" title="Copy AsciiDoc source">copy source</button>
            <button class="btn" id="btnClear" title="Clear editor">clear</button>
        </div>
    </header>

    <div class="workspace" id="workspace">
        <!-- LEFT: Editor -->
        <div class="pane" id="editorPane">
            <div class="pane-header">
                <svg class="pane-header-icon" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M1 2h14v1H1zm0 4h10v1H1zm0 4h12v1H1zm0 4h8v1H1z" />
                </svg>
                <span class="pane-label">Source</span>
            </div>
            <div class="editor-wrap">
                <textarea id="editor"></textarea>
            </div>
        </div>

        <!-- DIVIDER -->
        <div class="divider" id="divider"></div>

        <!-- RIGHT: Preview -->
        <div class="pane" id="previewPane">
            <div class="pane-header">
                <svg class="pane-header-icon" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M1 1h14v14H1zm1 1v12h12V2zm2 2h8v1H4zm0 3h6v1H4zm0 3h7v1H4z" />
                </svg>
                <span class="pane-label">Preview</span>
            </div>
            <div class="preview-wrap" id="preview">
                <div class="preview-inner" id="previewInner"></div>
                <div class="empty-state" id="emptyState">
                    <h3>Nothing here yet</h3>
                    <p>Start typing AsciiDoc in the editor on the left.<br>The preview will update as you write.</p>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // ── SAMPLE CONTENT ──────────────────────────────────────────────────
        const SAMPLE = [[${ content }]];

        // ── INIT CODEMIRROR ─────────────────────────────────────────────────
        const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
            mode: 'asciidoc',
            lineNumbers: true,
            lineWrapping: true,
            matchBrackets: true,
            autoCloseBrackets: true,
            indentWithTabs: false,
            tabSize: 2,
            extraKeys: { Tab: cm => cm.execCommand('indentMore') }
        });

        cm.setValue(SAMPLE);

        // ── ASCIIDOCTOR ─────────────────────────────────────────────────────
        const asciidoctor = Asciidoctor();

        function render(source) {
            const statusDot = document.getElementById('statusDot');
            const previewInner = document.getElementById('previewInner');
            const emptyState = document.getElementById('emptyState');

            statusDot.classList.add('stale');

            try {
                const html = asciidoctor.convert(source, {
                    safe: 'safe',
                    attributes: {
                        'showtitle': true,
                        //       'icons': 'font',
                        'source-highlighter': '',
                        'nofooter': true
                    }
                });

                if (!source.trim()) {
                    previewInner.innerHTML = '';
                    emptyState.classList.add('visible');
                } else {
                    emptyState.classList.remove('visible');
                    previewInner.innerHTML = html;
                }
            } catch (e) {
                previewInner.innerHTML = `<p style="color:#e06c75;font-family:monospace;padding:20px">Render error: ${e.message}</p>`;
            }

            statusDot.classList.remove('stale');
        }

        // ── DEBOUNCED LIVE UPDATE ────────────────────────────────────────────
        let renderTimer;
        cm.on('change', () => {
            document.getElementById('statusDot').classList.add('stale');
            clearTimeout(renderTimer);
            renderTimer = setTimeout(() => render(cm.getValue()), 250);
        });

        render(cm.getValue());

        // ── TOOLBAR BUTTONS ─────────────────────────────────────────────────
        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(cm.getValue()).then(() => {
                const btn = document.getElementById('btnCopy');
                btn.textContent = 'copied!';
                btn.classList.add('active');
                setTimeout(() => { btn.textContent = 'copy source'; btn.classList.remove('active'); }, 1500);
            });
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            if (confirm('Clear the editor?')) { cm.setValue(''); cm.focus(); }
        });

        document.getElementById('btnSave').addEventListener('click', () => {
            const asciidoc = cm.getValue();
            const html = document.getElementById('previewInner').innerHTML;
            // Send save request to backend
            const formData = new FormData();
            formData.append('asciidoc', asciidoc);
            formData.append('html', html);

            fetch("save", {
                method: "POST",
                body: formData
            }).then(response => {
                    if (response.ok) {
                        alert("Content saved successfully!");
                    } else {
                        alert("Error saving content.");
                    }
                })
        });

        // ── RESIZABLE DIVIDER ────────────────────────────────────────────────
        const divider = document.getElementById('divider');
        const workspace = document.getElementById('workspace');
        const editorPane = document.getElementById('editorPane');
        const previewPane = document.getElementById('previewPane');

        let dragging = false, startX, startEditorW;

        divider.addEventListener('mousedown', e => {
            dragging = true;
            startX = e.clientX;
            startEditorW = editorPane.getBoundingClientRect().width;
            divider.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            const totalW = workspace.getBoundingClientRect().width - divider.offsetWidth;
            const delta = e.clientX - startX;
            const newW = Math.min(Math.max(startEditorW + delta, 200), totalW - 200);
            const pct = (newW / totalW) * 100;
            editorPane.style.flex = `0 0 ${pct}%`;
            previewPane.style.flex = `0 0 ${100 - pct}%`;
            cm.refresh();
        });

        document.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            divider.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            cm.refresh();
        });

        // ── KEYBOARD SHORTCUT: Ctrl/Cmd+S → copy ────────────────────────────
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                document.getElementById('btnCopy').click();
            }
        });

        // Ensure CM fills height after fonts load
        window.addEventListener('load', () => cm.refresh());
    </script>
</body>

</html>
