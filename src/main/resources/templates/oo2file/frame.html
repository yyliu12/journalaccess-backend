<head>
	<link href="/static/mdb/mdb.min.css" rel="stylesheet">
	<meta charset="UTF-8">
	<title>Editor Frame for Only Office v1.0</title>
	<style>
		body,
		html {
			margin: 0;
			padding: 0;
			height: 100%;
			overflow: hidden;
		}

		#content {
			position: absolute;
			left: 0;
			right: 0;
			bottom: 0;
			top: 0;
		}

		.btn-floating {
			position: absolute;
			top: -5px;
			right: 0px;
			scale: 0.7;
		}
	</style>
	<style>
		head,
		body {
			margin: 0;
			padding: 0;
		}
	</style>

</head>

<body>

	<div id="placeholder"></div>

	<script type="text/javascript" th:src="${onlyOfficeUrl} + '/web-apps/apps/api/documents/api.js'"></script>

	<script th:inline="text">
		const config = [(${ onlyOfficeData })];

		const docEditor = new DocsAPI.DocEditor("placeholder", config);
	</script>

	<button class="btn btn-primary btn-floating" data-mdb-ripple-init onclick="upload();" type="button">
		<svg class="bi bi-save" fill="currentColor" height="16" viewBox="0 0 16 16" width="16"
			xmlns="http://www.w3.org/2000/svg">
			<path
				d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H9.5a1 1 0 0 0-1 1v7.293l2.646-2.647a.5.5 0 0 1 .708.708l-3.5 3.5a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L7.5 9.293V2a2 2 0 0 1 2-2H14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h2.5a.5.5 0 0 1 0 1z" />
		</svg>
	</button>



	    <div aria-hidden="true" class="modal fade" id="savingModal" tabindex="-1" data-mdb-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        Document is saving - Do NOT close window
                    </h5>
                </div>
                <div class="modal-body"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1" data-mdb-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Success</h5>
                </div>
                <div class="modal-body">Document saved successfully.</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="window.close()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div style="display:none" th:text="${sessionId}" id="sessionId"></div>
    <div style="display:none" th:text="${fileId}" id="fileId"></div>


    <script src="/static/mdb/mdb.umd.min.js"></script>

    <script th:inline="javascript">
        const sessionId = document.getElementById("sessionId").innerText;
        const fileId = document.getElementById("fileId").innerText;

        function upload() {
            const element = document.getElementById('savingModal');
            const modal = new mdb.Modal(element);

            const successModal = new mdb.Modal(document.getElementById('successModal'));

            modal.show();

            fetch("/api/oofile/saveOnlyOffice?sessionId=" + sessionId + "&fileId=" + fileId, {
                method: "GET"
            }).then(response => {
                if (response.ok) {
                    modal.hide();
                    successModal.show();
                } else {
                    modal.hide();
                    alert("Error saving document.");
                }
            }).catch(error => {
                modal.hide();
                alert("Error saving document: " + error);
            });
        }


    </script>
</body>
